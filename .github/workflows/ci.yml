name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build QEMU
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build meson pkg-config \
            libglib2.0-dev libpixman-1-dev libfdt-dev zlib1g-dev libslirp-dev \
            python3 python3-venv git gcc-arm-linux-gnueabi libc6-dev-armel-cross

      - name: Build QEMU
        run: bash qemu/setup.sh

      - name: Build IVE test initramfs
        run: |
          arm-linux-gnueabi-gcc -static -O2 -o /tmp/test-ive-init \
            qemu-boot/test-ive-ops.c
          mkdir -p /tmp/initramfs
          cp /tmp/test-ive-init /tmp/initramfs/init
          (cd /tmp/initramfs && echo init | cpio -o -H newc) > qemu-boot/test-ive.cpio

      - name: Verify machines
        run: |
          count=$(./qemu-src/build/qemu-system-arm -machine help | grep -cE '(hi35|gk7)')
          echo "Registered machines: $count"
          ./qemu-src/build/qemu-system-arm -machine help | grep -E '(hi35|gk7)'
          [ "$count" -ge 21 ]

      - name: Upload QEMU binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/qemu-system-arm
          retention-days: 1

      - name: Upload IVE test initramfs
        uses: actions/upload-artifact@v4
        with:
          name: ive-test-cpio
          path: qemu-boot/test-ive.cpio
          retention-days: 1

  ive-test:
    name: IVE register tests (19 ops)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfdt1 libglib2.0-0 libpixman-1-0 libslirp0 dnsmasq-base

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Download IVE test initramfs
        uses: actions/download-artifact@v4
        with:
          name: ive-test-cpio
          path: qemu-boot/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download EV300 kernel
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.hi3516ev300-nor-lite.tgz" \
              -o openipc.hi3516ev300-nor-lite.tgz
          tar xzf openipc.hi3516ev300-nor-lite.tgz

      - name: Run IVE register-level tests
        timeout-minutes: 2
        run: |
          timeout 60 ./qemu-src/build/qemu-system-arm \
            -M hi3516ev300 \
            -kernel qemu-boot/uImage.hi3516ev300 \
            -initrd qemu-boot/test-ive.cpio \
            -nographic -serial mon:stdio \
            -append "console=ttyAMA0,115200" \
            2>&1 | tee ive-output.txt || true

          echo ""
          echo "=== IVE Test Results ==="
          grep -E 'PASS|FAIL|Result' ive-output.txt

          # Verify all 19 tests passed
          if grep -q "Result: 19/19 passed" ive-output.txt; then
            echo "=== All IVE tests passed ==="
          else
            echo "=== IVE test FAILURE ==="
            exit 1
          fi

      - name: Upload IVE test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ive-test-log
          path: ive-output.txt
          retention-days: 7

  sofia-isp:
    name: Sofia ISP regression (hi3516ev200, sc2315e)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfdt1 libglib2.0-0 libpixman-1-0 libslirp0 dnsmasq-base curl

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download EV200 firmware
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.hi3516ev200-nor-lite.tgz" \
              -o openipc.hi3516ev200-nor-lite.tgz
          tar xzf openipc.hi3516ev200-nor-lite.tgz

      - name: Run Sofia ISP regression test
        timeout-minutes: 5
        env:
          # Tag of the qemu-hisilicon GitHub release that holds the
          # Sofia binary, fonts, and isp-profile fixtures.  Bump when
          # republishing.
          FIXTURES_TAG: sofia-fixtures-v1
          FIXTURES_REPO: ${{ github.repository }}
          ISP_READY_TIMEOUT: 45
          QEMU_TIMEOUT: 240
        run: |
          bash qemu-boot/sofia-isp-ci-test.sh

      - name: Upload Sofia test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sofia-isp-log
          path: |
            /tmp/sofia-ci-*/qemu-output.txt
            /tmp/sofia-ci-*/qemu-debug.log
            /tmp/sofia-ci-*/http.log
          retention-days: 7

  maskrom-av300:
    name: AV300 mask-ROM end-to-end (-bios re.elf)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfdt1 libglib2.0-0 libpixman-1-0 libslirp0 \
            gcc-arm-none-eabi make

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Checkout openhisilicon (bootrom RE source)
        uses: actions/checkout@v4
        with:
          repository: openipc/openhisilicon
          path: openhisilicon

      - name: Build hi3516av300 mask-ROM re.elf
        run: |
          make -C openhisilicon/bootrom/hi3516av300 build
          test -f openhisilicon/bootrom/hi3516av300/re.elf
          ls -la openhisilicon/bootrom/hi3516av300/re.elf

      - name: Verify mask-ROM handshake emission (no host reply)
        timeout-minutes: 2
        # Without a 0xAA reply, the bootrom resets in a loop. Each
        # uart0_wait_start_frame call emits 25× 0x20 then 0x0a (one full
        # handshake cycle = 26 bytes). The first 26 bytes must match the
        # exact handshake pattern — that asserts the full chain
        # _entry → main → fastboot_update → burn_bootloader →
        # uart0_wait_start_frame → uart0_write(0x20) ran verbatim from
        # our reverse-engineered source.
        #
        # Capture via file-backed chardev rather than -serial stdio.
        # stdio is block-buffered when stdout is redirected to a file
        # (CI case, not a TTY), so a slow CI runner that emits only
        # ~30 bytes before SIGTERM never flushes the 4 KiB stdio buffer
        # and we see 0 bytes.  -serial file:... writes directly with no
        # libc buffering.
        run: |
          timeout 20 ./qemu-src/build/qemu-system-arm \
              -M hi3516av300 \
              -bios openhisilicon/bootrom/hi3516av300/re.elf \
              -display none -monitor none \
              -serial file:/tmp/uart-handshake.bin \
              -serial null -serial null \
              2>/tmp/qemu-handshake.log || true

          bytes=$(stat -c%s /tmp/uart-handshake.bin)
          echo "captured: $bytes bytes"
          if [ "$bytes" -lt 26 ]; then
            echo "FAIL: too few UART bytes — bootrom did not reach uart0_write"
            echo "--- qemu stderr ---"
            cat /tmp/qemu-handshake.log
            echo "--- first 64 captured bytes (if any) ---"
            xxd /tmp/uart-handshake.bin
            exit 1
          fi
          head=$(head -c 26 /tmp/uart-handshake.bin | xxd -p | tr -d '\n')
          # One handshake cycle = 5 outer × 5 inner = 25× uart0_write(0x20)
          # followed by uart0_write('\n').  26 bytes total = 52 hex chars.
          expected="202020202020202020202020202020202020202020202020200a"
          if [ "${head}" != "${expected}" ]; then
            echo "FAIL: first 26 bytes don't match handshake pattern"
            echo "got:      ${head}"
            echo "expected: ${expected}"
            xxd /tmp/uart-handshake.bin | head -5
            exit 1
          fi
          echo "PASS: bootrom emitted 25× 0x20 + 0x0a handshake pattern"

      - name: Verify mask-ROM advances past handshake on 0xAA reply
        timeout-minutes: 2
        # Reply 0xAA mid-handshake.  uart0_wait_start_frame returns 1,
        # burn_bootloader writes SC_RECOVERY=1 and enters
        # uart0_recv_payload — which sits silently waiting for frames.
        #
        # The bootrom's RX FIFO is flushed at the START of every
        # uart0_wait_start_frame call (via uart0_flush_rx_fifo()).
        # So an ACK delivered BEFORE the bootrom reaches that function
        # gets discarded; it only counts if it arrives DURING the
        # emit window (between flush and the brief poll moments).
        # Wall-clock-based timing is therefore fragile across CI
        # speeds — we use event-driven sending instead: as soon as we
        # see the first 0x20 emission byte, the bootrom is mid-emit
        # past the flush, and the next handful of bytes we send will
        # land in the FIFO during the active poll window.
        run: |
          ./qemu-src/build/qemu-system-arm \
              -M hi3516av300 \
              -bios openhisilicon/bootrom/hi3516av300/re.elf \
              -display none -monitor none \
              -chardev socket,id=uart0,path=/tmp/uart.sock,server=on,wait=on \
              -serial chardev:uart0 \
              -serial null -serial null \
              2>/tmp/qemu-recv.log &
          QEMU_PID=$!
          for i in $(seq 1 20); do [ -S /tmp/uart.sock ] && break; sleep 0.5; done
          if ! [ -S /tmp/uart.sock ]; then
            echo "FAIL: qemu socket never appeared"
            cat /tmp/qemu-recv.log
            exit 1
          fi

          python3 - <<'PY'
          import socket, time, select, sys
          s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          s.connect('/tmp/uart.sock')
          s.setblocking(False)

          # Wait up to 30 s for the first 0x20 handshake byte — that
          # tells us the bootrom has just passed flush_rx_fifo and is
          # in the emit-and-poll phase of uart0_wait_start_frame.
          pre = bytearray()
          saw_emit = False
          deadline = time.monotonic() + 30
          while time.monotonic() < deadline:
              r, _, _ = select.select([s], [], [], 0.05)
              if r:
                  try:
                      c = s.recv(4096)
                  except (BlockingIOError, ConnectionError):
                      continue
                  if c:
                      pre.extend(c)
                      if 0x20 in c:
                          saw_emit = True
                          break

          if not saw_emit:
              print(f"FAIL: never saw a 0x20 byte in {len(pre)} bytes")
              sys.exit(1)

          # Burst 0xAA over 200 ms — covers multiple poll moments in
          # the current emit window plus a bit of slack.
          for _ in range(40):
              try: s.send(b'\xaa')
              except (BlockingIOError, ConnectionError): pass
              time.sleep(0.005)

          # Drain any inflight emission for ~1 s.
          time.sleep(1)
          while True:
              r, _, _ = select.select([s], [], [], 0.05)
              if not r: break
              try:
                  c = s.recv(4096)
              except (BlockingIOError, ConnectionError):
                  break
              if not c: break
              pre.extend(c)

          # Post-ACK silence window.  If bootrom consumed the ACK and
          # entered uart0_recv_payload, it stays silent regardless of
          # CI speed.
          post = bytearray()
          end = time.monotonic() + 3
          while time.monotonic() < end:
              r, _, _ = select.select([s], [], [], 0.1)
              if r:
                  try:
                      c = s.recv(4096)
                  except (BlockingIOError, ConnectionError):
                      break
                  if c: post.extend(c)

          open('/tmp/uart-pre.bin', 'wb').write(pre)
          open('/tmp/uart-post.bin', 'wb').write(post)
          print(f"pre+inflight: {len(pre)} bytes")
          print(f"post-ACK 3s:  {len(post)} bytes")
          if len(post) >= 26:
              print("FAIL: bootrom kept emitting handshakes after 0xAA")
              sys.exit(1)
          print("PASS: bootrom consumed 0xAA, advanced into uart0_recv_payload")
          PY

          kill $QEMU_PID 2>/dev/null; wait $QEMU_PID 2>/dev/null || true

      - name: Upload mask-ROM test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maskrom-av300-log
          path: |
            /tmp/uart-handshake.bin
            /tmp/uart-pre.bin
            /tmp/uart-post.bin
            /tmp/qemu-handshake.log
            /tmp/qemu-recv.log
            openhisilicon/bootrom/hi3516av300/re.elf
          retention-days: 7

  boot:
    name: Boot ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # mem/kernel_mem_mb/MMZ layout now lives in HisiSoCConfig; no -m
          # override here so CI exercises the same defaults as the run
          # scripts and real users.
          - name: hi3516cv100
            soc: hi3516cv100
            machine: hi3516cv100
            append: "console=ttyAMA0,115200 root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),2048k(kernel),5120k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516cv100-universal.bin

          - name: hi3516cv200
            soc: hi3516cv200
            machine: hi3516cv200
            append: "console=ttyAMA0,115200 root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516cv200-universal.bin
            flash_mem: 256M

          - name: hi3516av100
            soc: hi3516av100
            machine: hi3516av100
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516av100-universal.bin

          - name: hi3516cv300
            soc: hi3516cv300
            machine: hi3516cv300
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516cv300-universal.bin
            flash_mem: 256M

          # cv500 family covers av300 (same die, av300 is variant id 5);
          # one Linux + U-Boot gate exercises both.  flash_mem=1G because
          # the OpenIPC cv500 U-Boot is built assuming the platform-max
          # 1 GiB DDR and relocates itself to top-of-RAM (~0xBFEE2000).
          # The default 128 MiB ram_size leaves that target unmapped,
          # the relocation jump faults, and the CPU resets in a loop.
          - name: hi3516cv500
            soc: hi3516cv500
            machine: hi3516cv500
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516cv500-universal.bin
            flash_mem: 1G

          - name: hi3519v101
            soc: hi3519v101
            machine: hi3519v101
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3519v101-universal.bin

          - name: hi3516ev300
            soc: hi3516ev300
            # sensor=none skips the SoC-default IMX335 attach so OpenIPC's
            # /usr/sbin/load_hisilicon does not insmod the vendor MPP blob
            # (which segfaults on QEMU and prevents reaching login).
            machine: hi3516ev300,sensor=none
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs mtdparts=hi_sfc:256k(boot),64k(env),3072k(kernel),10240k(rootfs),-(rootfs_data)"
            ping_linux: true
            uboot_bin: u-boot-hi3516ev300-universal.bin
            flash_mem: 128M

          # hi3516cv610 (V5) has its own boot-hi3516cv610 job below: its
          # OpenIPC release is a combined firmware.bin (FIT kernel+dtb with an
          # appended SquashFS) under the SoC-family name, so it needs an
          # extraction step and doesn't fit this download/boot matrix.

          # NVR/DVR family — OpenIPC ships nor-lite firmware (kernel +
          # rootfs) and u-boot-${soc}-universal.bin for 3 SoCs:
          # hi3520dv200, hi3536cv100, hi3536dv100.  Linux boot test runs
          # for all three; all three also run the full U-Boot ping path
          # (parallel to hi3516av100, openhisilicon#59 / #74).  See the
          # per-SoC notes in qemu/hw/arm/hisilicon.c for which Ethernet
          # controller each instantiates (hieth-sf, femac, gmac).
          - name: hi3520dv200
            soc: hi3520dv200
            machine: hi3520dv200
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs"
            ping_linux: true
            uboot_bin: u-boot-hi3520dv200-universal.bin

          - name: hi3536cv100
            soc: hi3536cv100
            machine: hi3536cv100
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs"
            uboot_bin: u-boot-hi3536cv100-universal.bin

          - name: hi3536dv100
            soc: hi3536dv100
            machine: hi3536dv100
            append: "console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs"
            ping_linux: true
            uboot_bin: u-boot-hi3536dv100-universal.bin

    continue-on-error: ${{ matrix.allow_failure == true }}

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfdt1 libglib2.0-0 libpixman-1-0 libslirp0 dnsmasq-base

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Setup TAP network
        if: matrix.ping_linux || matrix.uboot_bin
        run: |
          sudo ip tuntap add dev tap0 mode tap user $(whoami)
          sudo ip link add qbr0 type bridge
          sudo ip link set qbr0 type bridge stp_state 0
          sudo ip link set tap0 master qbr0
          sudo ip link set qbr0 up
          sudo ip link set tap0 up
          sudo ip addr add 10.0.10.1/24 dev qbr0
          sudo iptables -I INPUT -i qbr0 -j ACCEPT
          # HTTP server for TCP connectivity test (validates TX checksum offload)
          python3 -m http.server 8080 --bind 10.0.10.1 &
          # dnsmasq: DHCP + DNS forwarder on the bridge
          sudo dnsmasq --interface=qbr0 --bind-interfaces --listen-address=10.0.10.1 \
            --dhcp-range=10.0.10.50,10.0.10.99,255.255.255.0,1h \
            --dhcp-option=3,10.0.10.1 --dhcp-option=6,10.0.10.1 \
            --no-resolv --server=8.8.8.8 \
            --no-daemon --log-dhcp --pid-file=/tmp/dnsmasq.pid &
          sleep 1

      - name: Download firmware
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.${{ matrix.soc }}-nor-lite.tgz" \
              -o "openipc.${{ matrix.soc }}-nor-lite.tgz"
          tar xzf "openipc.${{ matrix.soc }}-nor-lite.tgz"

      - name: "OpenIPC kernel + rootfs boot"
        timeout-minutes: 3
        run: |
          # All SoCs now reach login in <30 s with the default memory
          # layout from HisiSoCConfig (measured: CV100 ~20 s, CV200
          # ~18 s, AV100 ~15 s, CV300/CV500/3519V101 <30 s, EV300 ~7 s).
          # 120 s gives us a 4× margin over the measured worst case.
          #
          # `-nic user,restrict=on` keeps SLIRP's internal DHCP server
          # reachable (udhcpc still gets 10.0.2.15) but blocks all
          # outbound traffic.  Required because busybox ntpd in OpenIPC
          # uses a strict 0.5 ms STEP_PEER_MAX delay threshold; on
          # GitHub-hosted runners the NAT path adds >5 ms latency,
          # ntpd rejects every reply and loops past the 120 s deadline.
          # See openhisilicon#104.  With restrict=on the NTP pool DNS
          # lookups fail fast, ntpd exits, S49ntp returns "OK", and
          # the rest of init runs deterministically.
          QEMU=./qemu-src/build/qemu-system-arm
          timeout 120 $QEMU \
            -M ${{ matrix.machine }} \
            -kernel "qemu-boot/uImage.${{ matrix.soc }}" \
            -initrd "qemu-boot/rootfs.squashfs.${{ matrix.soc }}" \
            -nographic -serial mon:stdio \
            -nic user,restrict=on \
            -append '${{ matrix.append }}' \
            -d unimp,guest_errors -D qemu-boot/qemu.log \
            2>&1 | tee boot-output.txt &
          QEMU_PID=$!

          # Wait for login prompt
          for i in $(seq 1 120); do
            if grep -qE "login:|#\s*$" boot-output.txt 2>/dev/null; then
              echo ""
              echo "=== Boot successful: login prompt reached ==="
              kill $QEMU_PID 2>/dev/null || true

              # Regression: openhisilicon#66 — Wrong chip-id: hiunknown.
              # Caused by hisi-sysctl returning the packed 32-bit chip ID
              # at SCSYSID0 for V1/V2/V2A/V3/V3A SoCs that use a byte
              # layout on real silicon. Boot reaching login is not
              # enough — the firmware's chip-id check must succeed too,
              # otherwise load_hisilicon short-circuits before any
              # vendor module loads.
              if grep -qE "Wrong chip-id|hiunknown" boot-output.txt; then
                echo "=== FAIL: chip-id detection broken (openhisilicon#66) ==="
                grep -nE "Wrong chip-id|hiunknown" boot-output.txt
                exit 1
              fi
              echo "=== Chip-id detection OK ==="
              exit 0
            fi
            sleep 1
          done

          echo "=== TIMEOUT: login prompt not reached ==="
          echo "--- Last 30 lines of output ---"
          tail -30 boot-output.txt
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: "Linux ping + curl test"
        if: matrix.ping_linux
        timeout-minutes: 4
        run: |
          bash qemu-boot/test-linux-network.sh \
            --soc "${{ matrix.soc }}" \
            --machine "${{ matrix.machine }}" \
            --append '${{ matrix.append }}' \
            --qemu ./qemu-src/build/qemu-system-arm \
            --tap tap0 \
            --host-ip 10.0.10.1 \
            --login-timeout 120 \
            --ping-timeout 45 \
            --curl-timeout 100 \
            --curl-max-time 90 \
            --output-dir "qemu-boot/linux-network-${{ matrix.soc }}"

      - name: "U-Boot ping test"
        if: matrix.uboot_bin
        timeout-minutes: 2
        run: |
          QEMU=./qemu-src/build/qemu-system-arm

          # Download U-Boot and build flash image
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/${{ matrix.uboot_bin }}" \
              -o /tmp/u-boot.bin
          FLASH=/tmp/flash.bin
          dd if=/dev/zero of=$FLASH bs=1M count=8 2>/dev/null
          dd if=/tmp/u-boot.bin of=$FLASH bs=1 conv=notrunc 2>/dev/null
          dd if=qemu-boot/uImage.${{ matrix.soc }} of=$FLASH bs=1 seek=$((0x50000)) conv=notrunc 2>/dev/null
          dd if=qemu-boot/rootfs.squashfs.${{ matrix.soc }} of=$FLASH bs=1 seek=$((0x350000)) conv=notrunc 2>/dev/null

          mkfifo /tmp/ub.in /tmp/ub.out
          # flash_mem overrides the machine-default ram size for
          # U-Boot flash-boot (some SoCs need more RAM than the
          # kernel-default to fit U-Boot + decompressed kernel).
          MEM_ARG=""
          if [ -n "${{ matrix.flash_mem }}" ]; then
            MEM_ARG="-m ${{ matrix.flash_mem }}"
          fi
          # `-M $machine,flash-file=$f` works regardless of which
          # underlying flash controller (hisi-fmc / hisi-sfc350) the
          # machine instantiates.  See openhisilicon#80.
          $QEMU \
            -M ${{ matrix.machine }},flash-file=$FLASH $MEM_ARG \
            -nographic -serial pipe:/tmp/ub -nic tap,ifname=tap0,script=no,downscript=no \
            -monitor none &
          QEMU_PID=$!
          cat /tmp/ub.out > /tmp/uboot-ping.txt &

          # Keep input pipe open (prevents EOF on each write)
          exec 3>/tmp/ub.in

          # Wait for U-Boot to start before sending interrupt — sending too
          # early fills the UART FIFO and characters get dropped
          for i in $(seq 1 30); do
            if grep -q "autoboot" /tmp/uboot-ping.txt 2>/dev/null; then
              break
            fi
            sleep 0.5
          done

          # Smoke-only mode: stop after the autoboot prompt, skip the network
          # half.  Reserved for SoCs whose U-Boot networking path doesn't
          # complete in QEMU even though U-Boot itself runs.  No DVR/NVR SoC
          # uses this currently; it's kept available for new bring-ups that
          # need to land the Linux gate before the network model is finished.
          SMOKE_ONLY="${{ matrix.uboot_smoke_only || 'false' }}"
          if [ "$SMOKE_ONLY" = "true" ]; then
            exec 3>&-
            kill $QEMU_PID 2>/dev/null || true
            wait 2>/dev/null || true
            rm -f /tmp/ub.in /tmp/ub.out

            echo ""
            if grep -q "autoboot" /tmp/uboot-ping.txt; then
              echo "=== PASS: U-Boot smoke (reached autoboot) ==="
            else
              echo "=== FAIL: U-Boot smoke (no autoboot prompt) ==="
              exit 1
            fi
            exit 0
          fi

          # Interrupt autoboot (spam Ctrl-C until we see the prompt)
          for i in $(seq 1 20); do
            printf '\x03' >&3
            if grep -q "OpenIPC #\|hisilicon #\|=> " /tmp/uboot-ping.txt 2>/dev/null; then
              break
            fi
            sleep 0.2
          done

          echo "setenv ipaddr 10.0.10.15" >&3
          echo "setenv serverip 10.0.10.1" >&3
          echo "setenv gatewayip 10.0.10.1" >&3
          echo "setenv netmask 255.255.255.0" >&3
          sleep 1
          echo "ping 10.0.10.1" >&3

          # Wait for ping result (up to 30s)
          for i in $(seq 1 30); do
            if grep -qE "alive|ARP Retry" /tmp/uboot-ping.txt 2>/dev/null; then
              break
            fi
            sleep 1
          done

          exec 3>&-
          kill $QEMU_PID 2>/dev/null || true
          wait 2>/dev/null || true
          rm -f /tmp/ub.in /tmp/ub.out

          echo ""
          if grep -q "is alive" /tmp/uboot-ping.txt; then
            echo "=== PASS: U-Boot ping ==="
          else
            echo "=== FAIL: U-Boot ping ==="
            exit 1
          fi

      - name: Teardown TAP network
        if: always() && (matrix.ping_linux || matrix.uboot_bin)
        run: |
          sudo kill $(cat /tmp/dnsmasq.pid) 2>/dev/null || true
          sudo iptables -D INPUT -i qbr0 -j ACCEPT 2>/dev/null || true
          sudo ip link del qbr0 2>/dev/null || true
          sudo ip tuntap del dev tap0 mode tap 2>/dev/null || true

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-${{ matrix.name }}
          path: |
            boot-output.txt
            qemu-boot/qemu.log
            qemu-boot/linux-network-${{ matrix.soc }}
            /tmp/*-ping.txt
            /tmp/linux-network-summary.txt
          retention-days: 7

  # hi3516cv610 (V5).  Unlike the SoCs in the matrix above, OpenIPC ships
  # cv610 as a single firmware.bin (a FIT holding the kernel + dtb, with the
  # SquashFS rootfs appended) under the SoC-family name "hi3516cv6xx",
  # "ultimate" variant.  Split it into kernel/dtb/rootfs and boot like
  # qemu-boot/run-cv610.sh.
  boot-hi3516cv610:
    name: Boot hi3516cv610
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfdt1 libglib2.0-0 libpixman-1-0 libslirp0 u-boot-tools

      - name: Download QEMU binary
        uses: actions/download-artifact@v4
        with:
          name: qemu-arm
          path: qemu-src/build/

      - name: Make QEMU executable
        run: chmod +x qemu-src/build/qemu-system-arm

      - name: Download and split OpenIPC firmware
        run: |
          cd qemu-boot
          curl -sL "https://github.com/OpenIPC/firmware/releases/download/latest/openipc.hi3516cv6xx-nor-ultimate.tgz" \
              -o openipc.hi3516cv6xx-nor-ultimate.tgz
          tar xzf openipc.hi3516cv6xx-nor-ultimate.tgz
          FW=firmware.bin.hi3516cv6xx
          # FIT: image 1 = linux_kernel (zImage), image 0 = fdt-1 (dtb).
          dumpimage -T flat_dt -p 1 -o uImage.hi3516cv610 "$FW"
          dumpimage -T flat_dt -p 0 -o cv610.dtb          "$FW"
          # SquashFS rootfs is appended right after the FIT.
          sqoff=$(grep -aboP 'hsqs' "$FW" | head -1 | cut -d: -f1)
          dd if="$FW" of=rootfs.squashfs.hi3516cv610 bs=64k iflag=skip_bytes \
              skip="$sqoff" status=none
          ls -la uImage.hi3516cv610 cv610.dtb rootfs.squashfs.hi3516cv610

      - name: "OpenIPC kernel + rootfs boot"
        timeout-minutes: 4
        run: |
          # cv610's kernel is capped to 32 MiB by default (mmz claims the
          # rest); the "ultimate" rootfs ramdisk needs more, so pass mem=128M.
          QEMU=./qemu-src/build/qemu-system-arm
          timeout 150 $QEMU -M hi3516cv610 -m 256M \
            -kernel qemu-boot/uImage.hi3516cv610 \
            -dtb qemu-boot/cv610.dtb \
            -initrd qemu-boot/rootfs.squashfs.hi3516cv610 \
            -nographic -serial mon:stdio -nic user,restrict=on \
            -append 'mem=128M console=ttyAMA0,115200 earlyprintk root=/dev/ram0 rootfstype=squashfs' \
            -d unimp,guest_errors -D qemu-boot/qemu.log 2>&1 | tee boot-output.txt &
          QEMU_PID=$!

          # Wait for the login prompt.
          for i in $(seq 1 150); do
            if grep -qE "login:" boot-output.txt 2>/dev/null; then
              echo ""
              echo "=== Boot successful: login prompt reached ==="
              kill $QEMU_PID 2>/dev/null || true
              if grep -qE "SQUASHFS error|Kernel panic|deadlocked" boot-output.txt; then
                echo "=== FAIL: squashfs corruption / kernel panic ==="
                grep -nE "SQUASHFS error|Kernel panic|deadlocked" boot-output.txt | head
                exit 1
              fi
              echo "=== Boot clean ==="
              exit 0
            fi
            if ! kill -0 $QEMU_PID 2>/dev/null; then
              echo "=== FAIL: QEMU exited before login ==="
              tail -30 boot-output.txt
              exit 1
            fi
            sleep 1
          done

          echo "=== TIMEOUT: login prompt not reached ==="
          tail -30 boot-output.txt
          kill $QEMU_PID 2>/dev/null || true
          exit 1

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-hi3516cv610
          path: |
            boot-output.txt
            qemu-boot/qemu.log
          retention-days: 7
